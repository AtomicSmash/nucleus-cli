intro: "Hello {{client_name}}"

heading: "We're starting your monthly website maintenance for {{maintenance_month}}"

body_text: |
  Just a friendly message to let you know that today I am doing essential maintenance on your {{website_type}} website.

  Maintenance usually covers ensuring your site is safe and secure through updating the website core, and all plug-ins. We also look at any other improvements in terms of condensing the codebase or any efficiencies we can find.

  I will send you a quick summary at the end of the day to let you know exactly what's been covered off, if there is anything maintenance specific you'd like me to look at today let me know (e.g. installing a new plugin), just drop me a reply to this email.

  {{additional_information_start}}

